<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Khám phá Thành phố Huế</title>

<script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

<style>

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#eef3ff;
}

header{
    height:220px;
    background-size:cover;
    background-position:center;
    animation: headerSlide 10s infinite;
}

@keyframes headerSlide{
    0%{
        background:
        linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
        url("hue1.jpg");
    }
    50%{
        background:
        linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
        url("hue2.jpg");
    }
    100%{
        background:
        linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
        url("hue1.jpg");
    }
}

.top_bar{
    max-width:1200px;
    height:220px;
    margin:auto;
    display:flex;
    align-items:center;
    justify-content:center;
}

.site_name{
    color:white;
    font-size:32px;
    font-weight:600;
}

.site_name a{
    color:white;
    text-decoration:none;
}

/* ===== MENU ===== */
.sidebar{
    width:100%;
    background:white;
    border-bottom:3px solid #0a3d91;
}

.sidebar ul{
    list-style:none;
    display:flex;
    justify-content:center;
    gap:40px;
    padding:15px 0;
    margin:0;
}

.sidebar a{
    text-decoration:none;
    font-weight:600;
    color:#0a3d91;
    font-size:18px;
    padding:6px 12px;
    border-radius:4px;
    transition:0.2s;
}

.sidebar a:hover{
    background:#0a3d91;
    color:white;
}

/* ===== SECTION ===== */
.hue-section{
    max-width:1200px;
    margin:60px auto;
    padding:0 20px;
}

.section-title{
    text-align:center;
    font-size:36px;
    color:#0a3d91;
    margin-bottom:40px;
    font-weight:bold;
}


.book-wrapper{
display:flex;
flex-direction:column;
align-items:center;
}

#book{
height:350px;
width:495px;
}

.page{
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
}

.page img{
    max-width:100%;
    max-height:100%;
    object-fit:contain;
}
.book-controls{
margin-top:20px;
}

.book-controls button{
padding:10px 25px;
margin:0 10px;
border:none;
background:#0a3d91;
color:white;
border-radius:20px;
font-size:18px;
cursor:pointer;
}

.book-controls button:hover{
background:#062c6f;
}
@media(max-width:1000px){
    .resource-grid{
        grid-template-columns: repeat(3, 1fr);
    }
}

@media(max-width:600px){
    .resource-grid{
        grid-template-columns: repeat(2, 1fr);
    }

    .site_name{
        font-size:20px;
    }
}

 
footer{
    background:#0b1c3d;
    color:#ddd;
    text-align:center;
    padding:20px 10px;
    margin-top:60px;
}

footer p{
    margin:6px 0;
}
</style>

</head>

<body>

<header>
<div class="top_bar">
<div class="site_name">
<a href="#">Khám phá Thành phố Huế</a>
</div>
</div>
</header>
<aside class="sidebar">
    <ul>
        <li><a href="position.html">Vị trí</a></li>
        <li><a href="introduction.html">Giới thiệu</a></li> <li><a href="code.html">Khám phá</a></li>
        
        <li><a href="tourism.html">Lịch sử</a></li>
        <li><a href="resource.html">Tài nguyên</a></li>
    </ul>
</aside>
<section class="hue-section">

<h2 class="section-title">Di sản văn hóa Vật thể</h2>

<div class="book-wrapper">

<div id="book">

<!-- <div class="page"><img src="67/0.png"></div> -->
<div class="page"><img src="67/1.png"></div>
<div class="page"><img src="67/2.png"></div>
<div class="page"><img src="67/3.png"></div>
<div class="page"><img src="67/4.png"></div>
<div class="page"><img src="67/5.png"></div>
<div class="page"><img src="67/6.png"></div>
<!-- <div class="page"><img src="67/7.png"></div> -->
 

</div>

<div class="book-controls">
<button onclick="prevPage()">⬅ Trang trước</button>
<button onclick="nextPage()">Trang sau ➡</button>
</div>

</div>

</section>

<script>

const pageFlip = new St.PageFlip(
document.getElementById("book"),
{
    width:270,
    height:480,
    size:"fixed",
    showCover:true
}
)

pageFlip.loadFromHTML(document.querySelectorAll(".page"))

function nextPage(){
pageFlip.flipNext()
}

function prevPage(){
pageFlip.flipPrev()
}

</script>

</body>
</html>
