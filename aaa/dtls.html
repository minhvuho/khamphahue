<title>Khám phá Thành phố Huế</title>

<style>
body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#eef3ff;
}

header{
    height:220px;
    background-size:cover;
    background-position:center;
    animation: headerSlide 10s infinite;
}

@keyframes headerSlide{
    0%{
        background:
        linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
        url("hue1.jpg");
    }
    50%{
        background:
        linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
        url("hue2.jpg");
    }
    100%{
        background:
        linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
        url("hue1.jpg");
    }
}

.top_bar{
    max-width:1200px;
    height:220px;
    margin:auto;
    display:flex;
    align-items:center;
    justify-content:center;
}

.site_name{
    color:white;
    font-size:32px;
    font-weight:600;
}

.site_name a{
    color:white;
    text-decoration:none;
}

/* ===== MENU ===== */
.sidebar{
    width:100%;
    background:white;
    border-bottom:3px solid #0a3d91;
}

.sidebar ul{
    list-style:none;
    display:flex;
    justify-content:center;
    gap:40px;
    padding:15px 0;
    margin:0;
}

.sidebar a{
    text-decoration:none;
    font-weight:600;
    color:#0a3d91;
    font-size:18px;
    padding:6px 12px;
    border-radius:4px;
    transition:0.2s;
}

.sidebar a:hover{
    background:#0a3d91;
    color:white;
}

/* ===== SECTION ===== */
.hue-section{
    max-width:1200px;
    margin:60px auto;
    padding:0 20px;
}

.section-title{
    text-align:center;
    font-size:36px;
    color:#0a3d91;
    margin-bottom:40px;
    font-weight:bold;
}

/* ===== GRID 5 Ô 1 DÒNG ===== */
.resource-grid{
    display:grid;
    grid-template-columns: repeat(5, 1fr);
    gap:30px;
}

/* ===== Ô VUÔNG ===== */
.square-card{
    text-decoration:none;
    color:#0a3d91;
    text-align:center;
    transition:0.3s;
}

.square-img{
    aspect-ratio:1/1;
    overflow:hidden;
    border-radius:12px;
    box-shadow:0 6px 18px rgba(0,0,0,0.1);
    transition:0.3s;
}

.square-img img{
    width:100%;
    height:100%;
    object-fit:cover;
    transition:0.4s;
}

.square-card p{
    margin-top:12px;
    font-size:18px;
    font-weight:600;
}

/* Hover */
.square-card:hover .square-img{
    transform:translateY(-6px);
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.square-card:hover img{
    transform:scale(1.1);
}

/* ===== RESPONSIVE ===== */
@media(max-width:1000px){
    .resource-grid{
        grid-template-columns: repeat(3, 1fr);
    }
}

@media(max-width:600px){
    .resource-grid{
        grid-template-columns: repeat(2, 1fr);
    }

    .site_name{
        font-size:20px;
    }
}

 .a4-grid{
    display:grid;
    grid-template-columns: repeat(4, 1fr);  
    max-width:1100px;
    margin:auto;
    gap:40px;
}

.a4-card{
    text-decoration:none;
}

.a4-img{
    aspect-ratio:1/1.4;   /* tỉ lệ A4 đứng */
    overflow:hidden;
    border-radius:14px;
    box-shadow:0 8px 25px rgba(0,0,0,0.2);
    transition:0.3s;
}

.a4-img img{
    width:100%;
    height:100%;
    object-fit:cover;
    transition:0.4s;
}

.a4-card:hover .a4-img{
    transform:translateY(-8px);
    box-shadow:0 15px 35px rgba(0,0,0,0.3);
}

.a4-card:hover img{
    transform:scale(1.1);
}
footer{
    background:#0b1c3d;
    color:#ddd;
    text-align:center;
    padding:20px 10px;
    margin-top:60px;
}

footer p{
    margin:6px 0;
}
</style>
